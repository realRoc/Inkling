# XcodeGen 配置：`xcodegen` 即可生成 Inkling.xcodeproj
name: Inkling
options:
  bundleIdPrefix: com.wuyupeng
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: "SK8V5TAN28"   # Yumi Zhang
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  Inkling:
    type: application
    platform: macOS
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Inkling
        excludes:
          - "Resources/bridge/**"  # bridge 通过 Copy Files 阶段加进来
    resources:
      - path: Inkling/Resources
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: Inkling/Info.plist
      properties:
        CFBundleName: Inkling
        CFBundleDisplayName: Inkling
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true   # 不在 Dock 显示，仅状态栏
        NSAppleEventsUsageDescription: "Inkling 需要读取你选中的文本以便发给 Claude 解释。"
        NSAccessibilityUsageDescription: "Inkling 需要 Accessibility 权限来读取当前选中的文本。"
    entitlements:
      path: Inkling/Inkling.entitlements
      properties:
        com.apple.security.app-sandbox: false   # 划词工具需要 AX，沙盒下做不到
        com.apple.security.network.client: true
    preBuildScripts:
      - name: Build Node Bridge
        script: |
          set -e
          cd "$SRCROOT/bridge"
          if [ ! -d node_modules ]; then npm install; fi
          npm run build
        outputFiles:
          - $(SRCROOT)/bridge/dist/index.js
    postBuildScripts:
      - name: Embed Node Bridge
        script: |
          set -e
          # 在 build target 的临时目录里装一份 prod-only deps，避免把 TypeScript
          # 和 @types/* 等 ~150MB devDependencies 也塞进 App bundle。
          PROD_DIR="$TARGET_TEMP_DIR/bridge-prod"
          mkdir -p "$PROD_DIR"
          cp "$SRCROOT/bridge/package.json" "$PROD_DIR/"
          [ -f "$SRCROOT/bridge/package-lock.json" ] && cp "$SRCROOT/bridge/package-lock.json" "$PROD_DIR/"
          (
            cd "$PROD_DIR"
            if [ -f package-lock.json ]; then
              npm ci --omit=dev --no-audit --no-fund
            else
              npm install --omit=dev --no-audit --no-fund
            fi
          )

          DEST="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Resources/bridge"
          mkdir -p "$DEST"
          rsync -a --delete "$SRCROOT/bridge/dist/"        "$DEST/dist/"
          rsync -a                "$PROD_DIR/package.json" "$DEST/"
          rsync -a --delete "$PROD_DIR/node_modules/"      "$DEST/node_modules/"
